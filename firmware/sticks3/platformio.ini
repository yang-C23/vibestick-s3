; vibestick-s3 firmware for M5Stack StickS3 (ESP32-S3-PICO-1-N8R8).
; M0: skeleton + hardware-verification sketches. M2 wires up the full UI/voice.
; NOTE: board/PSRAM/pins are best-effort and MUST be confirmed with the
; button_test / audio_test envs before trusting them (see HARDWARE_CHECKLIST.md).

[platformio]
default_envs = sticks3

[env]
platform = espressif32 @ ^6.9.0
framework = arduino
; TODO(M2): switch to an official StickS3 board definition if/when published.
board = esp32-s3-devkitc-1
monitor_speed = 115200
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_opi   ; 8MB flash + 8MB OPI PSRAM (verify)
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
lib_deps =
    m5stack/M5Unified
    bblanchon/ArduinoJson @ ^7
    links2004/WebSockets @ ^2.4

[env:sticks3]
build_src_filter = +<*>

; Hardware-verification sketches. If the out-of-tree filter isn't honored by your
; PlatformIO version, copy the file into src/ and build env:sticks3 instead.
[env:button_test]
build_src_filter = -<*> +<../examples/button_test/>

[env:audio_test]
build_src_filter = -<*> +<../examples/audio_test/>
